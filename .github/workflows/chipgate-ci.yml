name: chipgate-ci
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install -r requirements.txt pytest
      - name: Run unit tests (806)
        run: python -m pytest tests/ -q
  hygiene:
    name: Hygiene checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No private imports / secrets / unsafe subprocess
        run: |
          ! grep -rnE "^\s*(from|import)\s+(app|core|modules|dtl_registry|jarvi3)\b" chipgate/ --include="*.py" || (echo "private import" && exit 1)
          ! grep -rniE "api[_-]?key\s*=\s*['\"]|password\s*=\s*['\"]|ANTHROPIC" chipgate/ --include="*.py" || (echo "secret" && exit 1)
          ! grep -rn "shell=True" chipgate/ --include="*.py" || (echo "unsafe subprocess" && exit 1)
          echo "hygiene ok"
